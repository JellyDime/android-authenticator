name: Sync, Build and Release APK

on:
  push:
    branches:
      - main
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    name: Sync Fork with Upstream
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    outputs:
      synced_sha: ${{ steps.sync_step.outputs.synced_sha }}
      has_new_commits: ${{ steps.sync_step.outputs.has_new_commits }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync with upstream
        id: sync_step
        run: |
          if [ "${{ github.ref_name }}" != "main" ]; then
            echo "::warning::Not triggered on main branch (current: ${{ github.ref_name }}). Skipping upstream sync."
            echo "has_new_commits=false" >> $GITHUB_OUTPUT
            echo "synced_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
            exit 0
          fi

          git remote remove upstream 2>/dev/null || true
          git remote add upstream https://github.com/protonpass/android-authenticator.git
          git fetch upstream
          git fetch origin main
          git checkout main
          
          BEFORE_SHA=$(git rev-parse HEAD)
          git merge origin/main --no-edit || true
          
          if ! git merge upstream/main --no-edit; then
            echo "::error::Merge conflict detected between upstream/main and origin/main. Please resolve manually."
            exit 1
          fi
          
          AFTER_SHA=$(git rev-parse HEAD)
          
          if [ "$BEFORE_SHA" == "$AFTER_SHA" ]; then
            echo "Repository is already up to date."
            echo "has_new_commits=false" >> $GITHUB_OUTPUT
          else
            echo "New commits merged. Pushing to origin..."
            git push origin main
            echo "has_new_commits=true" >> $GITHUB_OUTPUT
          fi
          
          echo "synced_sha=$AFTER_SHA" >> $GITHUB_OUTPUT

  build:
    name: Build and Release APK
    runs-on: ubuntu-latest
    needs: sync
    if: >-
      always() && (
        needs.sync.result == 'skipped' || 
        (needs.sync.result == 'success' && needs.sync.outputs.has_new_commits == 'false') ||
        github.event_name == 'workflow_dispatch'
      )
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.sync.outputs.synced_sha != '' && needs.sync.outputs.synced_sha || github.sha }}

      - name: Get actual HEAD info
        id: get_head
        run: |
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          DELIM="MARKER_$(openssl rand -hex 16)"
          {
            echo "message<<$DELIM"
            git log -1 --pretty=format:"%B"
            echo "$DELIM"
          } >> $GITHUB_OUTPUT
          echo "author=$(git log -1 --pretty=format:"%an")" >> $GITHUB_OUTPUT
          echo "timestamp=$(git log -1 --pretty=format:"%aI")" >> $GITHUB_OUTPUT

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          cat local.properties

      - name: Accept Android SDK Licenses
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: |
          ./gradlew :app:assemblePlayProdDebug --stacktrace

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.get_head.outputs.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          name: "Build ${{ steps.get_head.outputs.sha }}"
          body: |
            Automatic build triggered by `${{ github.event_name }}`.
            
            **Commit:** ${{ steps.get_head.outputs.sha }}
            **Message:** ${{ steps.get_head.outputs.message }}
            **Author:** ${{ steps.get_head.outputs.author }}
            **Timestamp:** ${{ steps.get_head.outputs.timestamp }}
          files: app/build/outputs/apk/**/*.apk
          draft: false
          prerelease: true
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
