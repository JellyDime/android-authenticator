name: Build and Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          cat local.properties

      - name: Accept Android SDK Licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew :app:assemblePlayProdDebug --stacktrace

      - name: Debug - List APK outputs
        if: always()
        run: |
          echo "=== Checking for APK files ==="
          find app/build -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
          echo "=== Directory structure ==="
          ls -R app/build/outputs/apk 2>/dev/null || echo "apk directory not found"

      - name: Locate Built APK
        id: find_apk
        run: |
          APK_PATH=$(find app/build -name "*.apk" -type f -print -quit)

          if [ -z "$APK_PATH" ]; then
            echo "APK not found! Build may have failed or produced no output."
            exit 1
          fi

          echo "Found APK: $APK_PATH"
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.sha }}
          name: "Build ${{ github.sha }}"
          body: |
            Automatic build triggered by push to `main` branch.

            **Commit:** ${{ github.sha }}
            **Message:** ${{ github.event.head_commit.message }}
            **Author:** ${{ github.event.head_commit.author.name }}
            **Timestamp:** ${{ github.event.head_commit.timestamp }}
          files: ${{ steps.find_apk.outputs.apk_path }}
          draft: false
          prerelease: true
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
